<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Cronómetro de Carrera</title>

<link rel="stylesheet" href="css/estilos.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

</head>

<body>

<h1>Juez de Carrera</h1>

<input

>

Crear
</button>

INICIAR CARRERA
</button>

<button class="crear" onclick="exportarPDF()">
Exportar resultados a PDF
</button>

<div id="corredores"></div>

<div id="panelBotones"></div>

<script src="js/script.js"></script>

</body>

</html>
